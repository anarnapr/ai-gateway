services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./tmp:/srv/tmp

volumes:
  redis-data:
